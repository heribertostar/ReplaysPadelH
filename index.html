<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Replays</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* HEADER tipo app */
.header {
  position: sticky;
  top: 0;
  background: #0a0a0a;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #222;
}

/* CONTENEDOR */
#app {
  padding: 10px;
}

/* CARD estilo Grabala */
.card {
  background: #121212;
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.01);
}

/* VIDEO */
iframe {
  width: 100%;
  height: 220px;
  border: none;
}

/* INFO */
.info {
  padding: 12px;
}

.time {
  font-size: 13px;
  color: #aaa;
}

.name {
  font-size: 16px;
  margin-top: 4px;
}

/* HIGHLIGHT último video */
.latest {
  border: 2px solid #00ff88;
}

/* badge */
.badge {
  position: absolute;
  background: #00ff88;
  color: black;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 10px;
  top: 10px;
  left: 10px;
}
</style>
</head>

<body>

<div class="header">🎾 Replays</div>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";
const TIEMPO_PROCESADO = 10000;

async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  const ahora = new Date();

  let videosListos = videos.filter(v => {
    let creado = new Date(v.createdTime);
    return (ahora - creado) > TIEMPO_PROCESADO;
  });

  render(videosListos);
}

function render(videos){
  const app = document.getElementById("app");
  app.innerHTML = "";

  videos.forEach((v, index) => {
    let d = new Date(v.createdTime);
    let time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let card = document.createElement("div");
    card.className = "card";

    if(index === 0){
      card.classList.add("latest");
    }

    let videoContainer = document.createElement("div");
    videoContainer.style.position = "relative";

    if(index === 0){
      let badge = document.createElement("div");
      badge.className = "badge";
      badge.innerText = "LIVE";
      videoContainer.appendChild(badge);
    }

    let iframe = document.createElement("iframe");
    iframe.src = `https://drive.google.com/file/d/${v.id}/preview`;

    videoContainer.appendChild(iframe);

    let info = document.createElement("div");
    info.className = "info";

    info.innerHTML = `
      <div class="time">🕒 ${time}</div>
      <div class="name">${v.name}</div>
    `;

    card.appendChild(videoContainer);
    card.appendChild(info);

    app.appendChild(card);
  });
}

loadVideos();
</script>

</body>
</html>
