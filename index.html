<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Replays</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.header {
  position: sticky;
  top: 0;
  background: #0a0a0a;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #222;
}

.section {
  padding: 10px;
}

.section-title {
  font-size: 14px;
  color: #aaa;
  margin: 10px 5px;
}

/* CARD */
.card {
  background: #121212;
  border-radius: 16px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
}

.info {
  padding: 12px;
}

.time {
  font-size: 13px;
  color: #aaa;
}

.name {
  font-size: 16px;
  margin-top: 4px;
}

/* BOTÓN DESCARGA */
.download {
  margin-top: 10px;
  display: inline-block;
  background: #00ff88;
  color: black;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 14px;
  text-decoration: none;
}

/* highlight */
.latest {
  border: 2px solid #00ff88;
}
</style>
</head>

<body>

<div class="header">🎾 Replays</div>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";
const TIEMPO_PROCESADO = 10000;

// 🧠 formatear fecha tipo humano
function tiempoHumano(date) {
  const ahora = new Date();
  const d = new Date(date);

  const diff = (ahora - d) / (1000 * 60 * 60 * 24);

  const hora = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (diff < 1 && ahora.getDate() === d.getDate()) {
    return `Hoy a las ${hora}`;
  }

  if (diff < 2) {
    return `Ayer a las ${hora}`;
  }

  return d.toLocaleDateString() + " " + hora;
}

// 🚀 cargar videos
async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  const ahora = new Date();

  let videosListos = videos.filter(v => {
    let creado = new Date(v.createdTime);
    return (ahora - creado) > TIEMPO_PROCESADO;
  });

  render(videosListos);
}

// 🎬 render
function render(videos){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let secciones = {};

  videos.forEach(v => {
    let d = new Date(v.createdTime);
    let key;

    if (new Date().toDateString() === d.toDateString()) {
      key = "Hoy";
    } else if ((new Date() - d) < 86400000 * 2) {
      key = "Ayer";
    } else {
      key = d.toLocaleDateString();
    }

    if (!secciones[key]) secciones[key] = [];
    secciones[key].push(v);
  });

  for (let section in secciones) {

    let div = document.createElement("div");
    div.className = "section";

    let title = document.createElement("div");
    title.className = "section-title";
    title.innerText = section;

    div.appendChild(title);

    secciones[section].forEach((v, index) => {

      let card = document.createElement("div");
      card.className = "card";

      if(section === "Hoy" && index === 0){
        card.classList.add("latest");
      }

      let info = tiempoHumano(v.createdTime);

      card.innerHTML = `
        <iframe src="https://drive.google.com/file/d/${v.id}/preview"></iframe>
        <div class="info">
          <div class="time">${info}</div>
          <div class="name">${v.name}</div>
          <a class="download" href="https://drive.google.com/uc?export=download&id=${v.id}">
            ⬇ Descargar
          </a>
        </div>
      `;

      div.appendChild(card);
    });

    app.appendChild(div);
  }
}

loadVideos();
</script>

</body>
</html>
