<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>🎾 Padel Replays</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #0a0a0a;
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 1px solid #222;
  z-index: 10;
}

/* CONTENEDOR */
#app {
  padding: 12px;
}

/* SECCIONES */
.section {
  margin-bottom: 25px;
}

.section-title {
  font-size: 18px;
  color: #aaa;
  margin: 10px 5px;
}

/* GRID */
.section-content {
  display: grid;
  gap: 16px;
  grid-template-columns: 1fr;
}

@media (min-width: 600px) {
  .section-content {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1000px) {
  .section-content {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* CARD */
.card {
  background: #121212;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 6px 25px rgba(0,0,0,0.6);
}

/* THUMBNAIL */
.video-wrapper {
  position: relative;
  cursor: pointer;
}

.thumb {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

@media (max-width: 600px) {
  .thumb {
    height: 300px;
  }
}

/* BOTÓN PLAY */
.play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 50px;
  color: white;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  padding: 10px 20px;
}

/* VIDEO */
iframe {
  width: 100%;
  height: 240px;
  border: none;
}

@media (max-width: 600px) {
  iframe {
    height: 300px;
  }
}

/* INFO */
.info {
  padding: 14px;
}

.time {
  font-size: 14px;
  color: #aaa;
}

.name {
  font-size: 17px;
  margin-top: 6px;
}

/* BOTÓN DESCARGA */
.download-btn {
  display: block;
  margin-top: 12px;
  padding: 12px;
  text-align: center;
  background: #00ff88;
  color: black;
  border-radius: 12px;
  font-size: 15px;
  text-decoration: none;
  font-weight: bold;
}

.download-btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="header">🎾 Padel Replays </div>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";
const TIEMPO_PROCESADO = 10000;

// ▶ reproducir video
function loadVideo(el, id) {
  el.innerHTML = `
    <iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay"></iframe>
  `;
}

// tiempo bonito
function tiempoHumano(date) {
  const ahora = new Date();
  const d = new Date(date);

  const diff = (ahora - d) / (1000 * 60 * 60 * 24);
  const hora = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (diff < 1 && ahora.getDate() === d.getDate()) {
    return `Hoy a las ${hora}`;
  }

  if (diff < 2) {
    return `Ayer a las ${hora}`;
  }

  return d.toLocaleDateString() + " " + hora;
}

// cargar videos
async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  const ahora = new Date();

  let videosListos = videos.filter(v => {
    let creado = new Date(v.createdTime);
    return (ahora - creado) > TIEMPO_PROCESADO;
  });

  render(videosListos);
}

// render
function render(videos){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let secciones = {};

  videos.forEach(v => {
    let d = new Date(v.createdTime);
    let key;

    if (new Date().toDateString() === d.toDateString()) {
      key = "Hoy";
    } else if ((new Date() - d) < 86400000 * 2) {
      key = "Ayer";
    } else {
      key = d.toLocaleDateString();
    }

    if (!secciones[key]) secciones[key] = [];
    secciones[key].push(v);
  });

  for (let section in secciones) {

    let div = document.createElement("div");
    div.className = "section";

    let title = document.createElement("div");
    title.className = "section-title";
    title.innerText = section;

    let content = document.createElement("div");
    content.className = "section-content";

    div.appendChild(title);

    secciones[section].forEach((v) => {

      let card = document.createElement("div");
      card.className = "card";

      let info = tiempoHumano(v.createdTime);

      card.innerHTML = `
        <div class="video-wrapper" onclick="loadVideo(this, '${v.id}')">
          <img src="https://drive.google.com/thumbnail?id=${v.id}" class="thumb">
          <div class="play">▶</div>
        </div>

        <div class="info">
          <div class="time">${info}</div>
          <div class="name">${v.name}</div>
          <a class="download-btn" href="https://drive.google.com/uc?export=download&id=${v.id}">
            ⬇ Descargar
          </a>
        </div>
      `;

      content.appendChild(card);
    });

    div.appendChild(content);
    app.appendChild(div);
  }
}

loadVideos();
</script>

</body>
</html>
