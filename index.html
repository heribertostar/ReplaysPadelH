<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mis Videos</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
}
.section { margin: 20px; }
.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
}
.video iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}
.time {
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>
<body>

<h1>🎥 Mis Videos</h1>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";

async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  // Ordenar por fecha DESC (más recientes primero)
  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  let grouped = {};

  videos.forEach(v => {
    let d = new Date(v.createdTime);

    let date = d.toLocaleDateString();
    let time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    if(!grouped[date]) grouped[date] = [];
    grouped[date].push({...v, time});
  });

  render(grouped);
}

function render(grouped){
  const app = document.getElementById("app");

  for(let date in grouped){
    let section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${date}</h2>`;

    grouped[date].forEach(v=>{
      let card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="time">🕒 ${v.time}</div>
        <div>${v.name}</div>
        <div class="video">
          <iframe src="https://drive.google.com/file/d/${v.id}/preview"></iframe>
        </div>
      `;

      section.appendChild(card);
    });

    app.appendChild(section);
  }
}

loadVideos();
</script>

</body>
</html>
