<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mis Videos</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
}
.section { margin: 20px; }
.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
}
.video iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}
.time {
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>
<body>

<h1>🎥 Mis Videos</h1>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";

// ⏳ tiempo mínimo para considerar listo (en ms)
const TIEMPO_PROCESADO = 90000; // 10 segundos

async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  const ahora = new Date();

  // 🔥 FILTRO REAL
  let videosListos = videos.filter(v => {
    let creado = new Date(v.createdTime);
    return (ahora - creado) > TIEMPO_PROCESADO;
  });

  render(videosListos);
}

// 🎬 render
function render(videos){
  const app = document.getElementById("app");
  app.innerHTML = "";

  videos.forEach(v => {
    let d = new Date(v.createdTime);
    let time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="time">🕒 ${time}</div>
      <div>${v.name}</div>
      <iframe src="https://drive.google.com/file/d/${v.id}/preview"></iframe>
    `;

    app.appendChild(card);
  });
}

// cargar una sola vez
loadVideos();
</script>

</body>
</html>
