<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mis Videos</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
}
.section { margin: 20px; }
.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
}
.video iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}
.time {
  font-size: 14px;
  opacity: 0.7;
}
</style>

</head>
<body>

<h1>🎥 Mis Videos</h1>
<div id="app"></div>

<script>
const API_KEY = "AIzaSyDihD7Bc1KaWhL1f5JhEMYNDGSCM9ZVycI";
const FOLDER_ID = "1fDE2bE_dC39VU7k_mCTHMYHtmYbKFIJc";

let ultimoVideo = null;

// 🚀 Cargar videos
async function loadVideos() {

  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&key=${API_KEY}&fields=files(id,name,createdTime)`;

  const res = await fetch(url);
  const data = await res.json();

  let videos = data.files;

  // Ordenar por fecha DESC
  videos.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));

  // 🔥 SOLO actualizar si hay nuevo video
  if (videos.length > 0 && videos[0].id !== ultimoVideo) {
    ultimoVideo = videos[0].id;
    console.log("🎬 Nuevo replay detectado");

    render(videos);
  }
}

// 🎬 Render limpio
function render(videos){
  const app = document.getElementById("app");
  app.innerHTML = "";

  videos.forEach(v => {
    let d = new Date(v.createdTime);
    let time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let card = document.createElement("div");
    card.className = "card";

    let loading = document.createElement("div");
    loading.innerText = "⏳ Procesando video...";

    let iframe = document.createElement("iframe");
    iframe.src = `https://drive.google.com/file/d/${v.id}/preview`;
    iframe.style.display = "none";

    iframe.onload = () => {
      loading.remove();
      iframe.style.display = "block";
    };

    card.innerHTML = `
      <div class="time">🕒 ${time}</div>
      <div>${v.name}</div>
    `;

    card.appendChild(loading);
    card.appendChild(iframe);

    app.appendChild(card);
  });
}

// 🔄 revisar cada 5s (pero sin re-render innecesario)
setInterval(loadVideos, 5000);

// primera carga
loadVideos();
</script>

</body>
</html>
