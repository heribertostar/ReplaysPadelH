<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Replay Control</title>

<style>
body {
  background: #111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
button {
  font-size:30px;
  padding:30px 50px;
  border-radius:20px;
  background:#ff3b30;
  color:white;
  border:none;
}
</style>

</head>
<body>

<button onclick="guardarReplay()">🎬 GUARDAR REPLAY</button>

<script>
function guardarReplay() {
  const ws = new WebSocket("wss://192.168.1.114:4455");

  ws.onopen = () => {
    console.log("Conectado a OBS");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    console.log("Mensaje OBS:", data);

    // Cuando OBS manda el Hello (op:0), ya podemos mandar comando
    if (data.op === 0) {
      ws.send(JSON.stringify({
        op: 6,
        d: {
          requestType: "SaveReplayBuffer",
          requestId: "replay1"
        }
      }));
    }
  };

  ws.onerror = () => {
    alert("❌ No conecta con OBS");
  };
}
  console.log(event.data);
</script>

</body>
</html>
